<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,700;1,600&family=Hanken+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  body{width:1600px;height:520px;background:#F6EFE0;display:flex;align-items:center;justify-content:center;gap:54px;font-family:'Spectral',Georgia,serif}
  .tile{width:300px;height:300px;border-radius:64px;background:#25382A;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 24px 56px rgba(37,56,42,.26)}
  .tile svg{width:176px;height:176px}
  .word{display:flex;flex-direction:column;justify-content:center}
  .word h1{font-family:'Spectral',serif;font-weight:700;font-size:148px;line-height:.92;margin:0;color:#25382A;letter-spacing:-3px}
  .word p{font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:34px;margin:18px 0 0;color:#5F8A55;letter-spacing:.5px}
</style></head>
<body>
  <div class="tile">
    <svg viewBox="0 0 32 32" fill="none">
      <rect x="4" y="4" width="24" height="24" rx="4.5" stroke="#D6A23E" stroke-width="2.3"/>
      <path d="M4 13H28" stroke="#D6A23E" stroke-width="2.3"/>
      <path d="M13 13V28" stroke="#D6A23E" stroke-width="2.3"/>
      <path d="M16.4 20.6l2.7 2.7 5.1-5.9" stroke="#D6A23E" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="word">
    <h1>Gabarito</h1>
    <p>a base viva do CAR</p>
  </div>
</body></html>
